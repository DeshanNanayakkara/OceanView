server:
  port: 9192

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hotelbooking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never

  jpa:
    defer-datasource-initialization: true
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
      file-size-threshold: 2KB

security:
  jwt:
    secret-key: 36763979244226452948404D635166546A576D5A7134743777217A25432A462D
    expire-length: 3600000
